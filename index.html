<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hitster Companion</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
</head>
<body>
    <h1>Hitster Scanner</h1>
    
    <!-- Auth View -->
    <div id="auth-container" class="hidden">
        <p>You need to connect a Premium Spotify Account to play.</p>
        <button id="btn-login" class="btn">Log in with Spotify</button>
    </div>

    <!-- Main App View -->
    <div id="app-content" class="hidden">
        <button id="btn-logout" class="btn" style="position:absolute; top:10px; right:10px; font-size:0.7rem; padding: 6px 12px;">Logout</button>
        
        <div id="reader-container">
            <div id="reader"></div>
        </div>
        
        <!-- Game Play & Reveal View -->
        <div id="game-container" class="hidden">
            <div id="status-text" class="status-text">Ready</div>
            
            <button id="btn-reveal" class="btn hidden">Reveal Card</button>
            
            <div id="metadata-display" class="hidden">
                <img id="track-cover" src="" alt="Album Cover">
                <h2 id="track-title">Title</h2>
                <p id="track-artist">Artist</p>
            </div>
            
            <button id="btn-next" class="btn hidden" style="margin-top: 20px;">Next Scan</button>
        </div>

        <!-- Data Management Container -->
        <div id="data-container" style="margin-top: 30px; text-align: center; border-top: 1px solid #333; padding-top: 20px;">
            <p style="font-size: 0.8rem; color: #888; text-transform: uppercase;">Gestión de Tarjetas</p>
            <button id="btn-export" class="btn" style="background-color: #444; color: #fff; font-size: 0.8rem; padding: 8px 16px;">Exportar JSON</button>
            <button id="btn-import-trigger" class="btn" style="background-color: #444; color: #fff; font-size: 0.8rem; padding: 8px 16px;">Importar JSON</button>
            <input type="file" id="file-import" accept=".json" class="hidden">
        </div>
    </div>

    <!-- App Logic -->
    <script type="module" src="js/game.js"></script>
</body>
</html>
